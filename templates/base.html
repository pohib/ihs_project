<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firewall Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type="file"]::file-selector-button {
            background: #0f0f23;
            border: 1px solid #1e1e2e;
            padding: 0.4rem 0.8rem;
            border-radius: 0.5rem;
            color: #a3a8c8;
            font-weight: 600;
            margin-right: 1rem;
            cursor: pointer;
        }
        input[type="file"]::file-selector-button:hover {
            background: #1e1e2e;
            color: #e2e5f1;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a14; }
        ::-webkit-scrollbar-thumb { background: #24243e; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #404064; }
    </style>
</head>
<body class="bg-[#0a0a14] font-sans text-slate-300 min-h-screen">
    <nav class="bg-[#0f0f23] border-b border-slate-900/50 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="{% url 'rule_list' %}" class="font-bold text-lg tracking-tight text-slate-100 hover:text-white transition-colors">
                Анализатор правил межсетевого экранирования
            </a>
            <div class="text-[10px] text-slate-500 uppercase tracking-[0.2em] font-bold">
                System Security Automation
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
