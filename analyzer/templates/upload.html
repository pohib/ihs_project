{% extends "base.html" %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="bg-[#0f0f23] p-8 rounded-2xl shadow-2xl border border-slate-800/50 max-w-md w-full">
        <h2 class="text-xl font-bold text-slate-100 mb-2">Загрузка данных</h2>
        <p class="text-slate-500 text-xs mb-8 uppercase tracking-widest font-semibold">Только CSV/JSON</p>
        
        <form method="post" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}
            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-400 uppercase tracking-tight">Выберите файл конфигурации</label>
                <div class="border-2 border-dashed border-slate-800/50 rounded-xl p-4 hover:border-slate-700/70 transition-colors bg-slate-900/30">
                    {{ form.file }}
                </div>
            </div>
            
            <div class="flex flex-col gap-3">
                <button type="submit" class="w-full py-3 bg-slate-800 hover:bg-slate-700 text-slate-100 rounded-xl font-bold text-sm transition border border-slate-700">Импортировать</button>
                <a href="{% url 'rule_list' %}" class="w-full text-center py-2 text-slate-500 hover:text-slate-300 text-sm transition">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
