version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=firewall_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secure_password_123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d firewall_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
              python manage.py collectstatic --noinput &&
              gunicorn analyzer.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - SECRET_KEY=django-insecure-prod-key-change-me
      - ALLOWED_HOSTS=localhost,127.0.0.1,IP_ТВОЕГО_СЕРВЕРА
      - DATABASE_URL=postgres://admin:secure_password_123@db:5432/firewall_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: